<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>fógraí - Classifieds</title>
    <link rel="stylesheet" href="stylish.css" />
  </head>
  <body>
    <div class="header">
      <h1><i>fógraí</i></h1>
      <div class="filter-container">
        <label for="section-filter">Filter by Section:</label>
        <select id="section-filter">
          <option value="all">All</option>
        </select>
      </div>
      <button
        id="open-overlay"
        class="open-overlay-button"
        aria-label="Add a new classified ad"
      >
        ➕️
      </button>
    </div>
    <div class="container" id="classifieds-container">
      <!-- Classifieds content will be dynamically loaded here -->
      <loading-skeletons></loading-skeletons>
    </div>
    <div
      id="ad-form-overlay"
      class="overlay hidden"
      aria-hidden="true"
      role="dialog"
      aria-labelledby="overlay-title"
    >
      <div class="form-container" tabindex="-1">
        <h2>Submit Your Ad</h2>
        <div class="sticky-price price-summary">
          Total Price: €<span id="price-total-header">0.00</span>
        </div>
        <form id="ad-form">
          <!-- Section -->
          <label for="section">Section:</label>
          <select id="section" name="section">
            <option value="for-sale">For Sale</option>
            <option value="real-estate">Real Estate</option>
            <option value="vehicles">Vehicles</option>
            <option value="jobs">Jobs</option>
            <option value="services">Services</option>
            <option value="miscellaneous">Miscellaneous</option>
            <option value="announcements">Announcements</option>
            <option value="personals">Personals</option>
            <option value="lost-and-found">Lost and Found</option>
            <option value="community-events">Community Events</option>
          </select>

          <!-- Ad Title -->
          <label for="title">Ad Title (Max 50 characters):</label>
          <input type="text" id="title" name="title" maxlength="50" required />

          <!-- Ad Content -->
          <label for="content"
            >Ad Content (256 chars free, €0.10/32 chars after, max 1024):</label
          >
          <textarea
            id="content"
            name="content"
            maxlength="1024"
            rows="5"
            placeholder=""
            required
          ></textarea>

          <!-- Image Upload -->
          <label for="images"
            >Upload Images (1st free, €0.10/image after):</label
          >
          <input
            type="file"
            id="images"
            name="images"
            accept="image/*"
            multiple
          />

          <!-- Contact -->
          <fieldset id="contact-options">
            <legend>Preferred Contact Method:</legend>
            <label>
              <input
                type="radio"
                name="preferred-method"
                value="email"
                required
                checked
              />
              Email (Free)
            </label>
            <label>
              <input type="radio" name="preferred-method" value="sms" /> SMS
              (+€0.15)
            </label>
            <label>
              <input type="radio" name="preferred-method" value="call" /> Call
              (+€0.15)
            </label>
            <label>
              <input type="radio" name="preferred-method" value="whatsapp" />
              WhatsApp (+€0.10)
            </label>
            <label>
              <input type="radio" name="preferred-method" value="signal" />
              Signal (+€0.05)
            </label>
            <label>
              <input type="radio" name="preferred-method" value="viber" /> Viber
              (+€0.10)
            </label>
            <label>
              <input type="radio" name="preferred-method" value="messenger" />
              Messenger (Free)
            </label>
            <label>
              <input type="radio" name="preferred-method" value="telegram" />
              Telegram (Free)
            </label>
            <label>
              <input type="radio" name="preferred-method" value="snapchat" />
              SnapChat (Free)
            </label>
          </fieldset>
          <label for="contact" id="contact-label">Your Email:</label>
          <input
            type="email"
            id="contact"
            name="contact"
            placeholder="Enter email"
            required
          />

          <!-- Price Display -->
          <div class="price-summary">
            Total Price: €<span id="price-total-footer">0.00</span>
          </div>

          <!-- Buttons -->
          <div class="form-buttons">
            <button type="button" id="cancel-button">Cancel</button>
            <button type="submit">Submit</button>
          </div>
        </form>
      </div>
    </div>
    <script src="./scripting.js"></script>
  </body>
</html>
