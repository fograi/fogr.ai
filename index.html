<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Classifieds</title>
    <style>
      body {
        font-family: 'Times New Roman', Times, serif;
        background-color: #f8f8f8;
        color: #000;
        margin: 0;
        padding: 0;
      }

      .header {
        background-color: #000;
        color: #fff;
        padding: 20px;
        text-align: center;
        position: sticky;
        top: 0;
        z-index: 1000;
      }

      .header h1 {
        margin: 0;
        font-size: 36px;
        font-family: 'Georgia', serif;
      }

      .header p {
        font-size: 18px;
        font-style: italic;
        margin: 5px 0 15px 0;
      }
      .classified-time {
        font-size: 12px;
        color: #888;
        margin-top: 5px;
        font-style: italic;
      }
      .filter-container {
        margin-top: 10px;
      }

      .filter-container select {
        padding: 5px;
        font-size: 14px;
      }

      .container {
        column-count: auto;
        column-gap: 10px;
        column-width: 12rem;
        margin: 20px auto;
        background: #fff;
        padding: 20px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        border: 1px solid #ccc;
      }

      .classified-section {
        break-inside: avoid;
        background-color: #f9f9f9;
        border: 1px solid #ddd;
        margin-bottom: 10px;
        padding: 10px;
      }

      .section-title {
        font-weight: bold;
        font-size: 18px;
        text-transform: uppercase;
        border-bottom: 2px solid #000;
        padding-bottom: 5px;
        margin-bottom: 10px;
      }

      .classified {
        margin-bottom: 10px;
      }

      .classified-title {
        font-weight: bold;
        font-size: 16px;
      }

      .classified-description {
        font-size: 14px;
        line-height: 1.6;
      }

      .classified-contact {
        font-style: italic;
        font-size: 12px;
        color: #555;
      }

      hr {
        border: none;
        border-top: 1px dashed #000;
        margin: 10px 0;
      }

      .loading-skeleton {
        background-color: #ddd;
        height: 20px;
        margin-bottom: 10px;
        animation: shimmer 1.5s infinite linear;
      }

      @keyframes shimmer {
        0% {
          background-position: -200px 0;
        }
        100% {
          background-position: 200px 0;
        }
      }

      @media (max-width: 768px) {
        .container {
          column-count: 1;
          width: 90%;
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1><i>fógraí</i></h1>
      <p><i>classifieds</i></p>
      <div class="filter-container">
        <label for="section-filter">Filter by Section:</label>
        <select id="section-filter">
          <option value="all">All</option>
        </select>
      </div>
    </div>
    <div class="container" id="classifieds-container">
      <!-- Classifieds content will be dynamically loaded here -->
    </div>

    <script>
      const sectionsList = [
        'for-sale',
        'real-estate',
        'vehicles',
        'jobs',
        'services',
        'miscellaneous',
        'announcements',
        'personals',
        'lost-and-found',

        'business-opportunities',

        'wanted',

      function populateSectionFilter() {
        const sectionFilter = document.getElementById('section-filter');
        sectionFilter.innerHTML = ''; // Clear existing options

        // Add "All" option
        const allOption = document.createElement('option');
        allOption.value = 'all';
        allOption.textContent = 'All';
        sectionFilter.appendChild(allOption);

        // Add dynamic sections
        sectionsList.forEach((section) => {
          const option = document.createElement('option');
          option.value = section;
          option.textContent = section
            .replace(/-/g, ' ')
            .replace(/\b\w/g, (c) => c.toUpperCase());
          sectionFilter.appendChild(option);
        });
      }

      // Call function on load
      populateSectionFilter();

      function filterClassifieds() {
        const selectedSection = document.getElementById('section-filter').value;

        // Filter data based on the selected section
        const filteredData =
          selectedSection === 'all'
            ? mockData // Show all if 'All' is selected
            : mockData.filter((ad) => ad.section === selectedSection);

        // Reload classifieds with filtered data
        loadClassifieds(filteredData);
      }

      // Attach event listener to the filter
      document
        .getElementById('section-filter')
        .addEventListener('change', filterClassifieds);

      const classifiedsContainer = document.getElementById(
        'classifieds-container'
      );

      function displayLoadingSkeletons() {
        classifiedsContainer.innerHTML = '';
        for (let i = 0; i < 6; i++) {
          const skeleton = document.createElement('div');
          skeleton.className = 'loading-skeleton';
          classifiedsContainer.appendChild(skeleton);
        }
      }

      function loadClassifieds(data) {
        const sections = {}; // To group classifieds by their section
        classifiedsContainer.innerHTML = ''; // Clear the container

        // Irish phone number regex
        const irishPhoneRegex =
          /^((\+353|0)[1-9]\d{1,2})?[\s-]?\d{3}[\s-]?\d{4}$/;

        // Group data by section
        data.forEach((ad) => {
          if (!sections[ad.section]) {
            sections[ad.section] = [];
          }
          sections[ad.section].push(ad);
        });

        // Create sections and append them
        Object.keys(sections).forEach((section) => {
          const sectionDiv = document.createElement('div');
          sectionDiv.className = 'classified-section';

          const title = document.createElement('div');
          title.className = 'section-title';
          title.textContent = section.replace(/-/g, ' ').toUpperCase();

          sectionDiv.appendChild(title);

          sections[section].forEach((ad, index) => {
            const adDiv = document.createElement('div');
            adDiv.className = 'classified';

            const adTitle = document.createElement('div');
            adTitle.className = 'classified-title';
            adTitle.textContent = ad.title;

            const adDescription = document.createElement('div');
            adDescription.className = 'classified-description';
            adDescription.textContent = ad.description;

            const adContact = document.createElement('div');
            adContact.className = 'classified-contact';

            // Recognize contact type and preferred platform
            if (ad.contact) {
              let link = null;

              // Default handling for email and phone number
              if (!ad.platform) {
                if (/\S+@\S+\.\S+/.test(ad.contact)) {
                  // Email
                  link = document.createElement('a');
                  link.href = `mailto:${ad.contact}`;
                  link.textContent = `Email: ${ad.contact}`;
                } else if (irishPhoneRegex.test(ad.contact)) {
                  // Irish phone number
                  link = document.createElement('a');
                  link.href = `tel:${ad.contact.replace(/\s+/g, '')}`;
                  link.textContent = `Call: ${ad.contact}`;
                }
              } else {
                // Platform-specific handling
                switch (ad.platform) {
                  case 'call':
                    link = document.createElement('a');
                    link.href = `tel:${ad.contact.replace(/\s+/g, '')}`;
                    link.textContent = `Call: ${ad.contact}`;
                    break;
                  case 'sms':
                    link = document.createElement('a');
                    link.href = `sms:${ad.contact.replace(/\s+/g, '')}`;
                    link.textContent = `Text: ${ad.contact}`;
                    break;
                  case 'whatsapp':
                    link = document.createElement('a');
                    link.href = `https://wa.me/${ad.contact
                      .replace(/\s+/g, '')
                      .replace(/^0/, '353')}`;
                    link.textContent = `WhatsApp: ${ad.contact}`;
                    break;
                  case 'signal':
                    link = document.createElement('a');
                    link.href = `signal://send?phone=${ad.contact
                      .replace(/\s+/g, '')
                      .replace(/^0/, '353')}`;
                    link.textContent = `Signal: ${ad.contact}`;
                    break;
                  case 'viber':
                    link = document.createElement('a');
                    link.href = `viber://chat?number=${ad.contact
                      .replace(/\s+/g, '')
                      .replace(/^0/, '353')}`;
                    link.textContent = `Viber: ${ad.contact}`;
                    break;
                  case 'messenger':
                    link = document.createElement('a');
                    link.href = `https://m.me/${ad.contact}`;
                    link.textContent = `Messenger: ${ad.contact}`;
                    break;
                  default:
                    link = document.createElement('span');
                    link.textContent = ad.contact; // Fallback for unhandled cases
                }
              }

              if (link) {
                link.style.textDecoration = 'none';
                link.style.color = '#007bff';
                adContact.appendChild(link);
              }
            }

            const adTime = document.createElement('div');
            adTime.className = 'classified-time';
            adTime.textContent = timeAgo(ad.timestamp);

            adDiv.appendChild(adTitle);
            adDiv.appendChild(adDescription);
            adDiv.appendChild(adContact);
            adDiv.appendChild(adTime);
            sectionDiv.appendChild(adDiv);

            // Add <hr> separator except after the last classified in the group
            if (index < sections[section].length - 1) {
              const hr = document.createElement('hr');
              sectionDiv.appendChild(hr);
            }
          });

          classifiedsContainer.appendChild(sectionDiv);
        });
      }
      // Helper function to calculate time ago
      function timeAgo(date) {
        const now = new Date();
        const past = new Date(date);
        const diff = Math.floor((now - past) / 1000); // Difference in seconds

        if (diff < 60) return `${diff} seconds ago`;
        if (diff < 3600) return `${Math.floor(diff / 60)} minutes ago`;
        if (diff < 86400) return `${Math.floor(diff / 3600)} hours ago`;
        if (diff < 2592000) return `${Math.floor(diff / 86400)} days ago`;
        if (diff < 31536000) return `${Math.floor(diff / 2592000)} months ago`;
        return `${Math.floor(diff / 31536000)} years ago`;
      }
      // Simulate loading process
      displayLoadingSkeletons();
      setTimeout(() => loadClassifieds(mockData), 2000);
